name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    env:
      CI: true
      COREPACK_ENABLE_DOWNLOAD_PROMPT: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      # Postgres-backed tests remain opt-in via ROBOOPS_RUN_POSTGRES_TESTS=true.
      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  container-images:
    name: Container Images (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: test-and-build

    strategy:
      fail-fast: false
      matrix:
        include:
          - app_package: "@roboops/fleet-platform"
            image: "fleet-platform"
          - app_package: "@roboops/operator-ui"
            image: "operator-ui"
          - app_package: "@roboops/cloud-edge-simulator"
            image: "cloud-edge-simulator"
          - app_package: "@roboops/event-worker"
            image: "event-worker"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build image
        run: |
          docker build \
            -f infra/container-images/Dockerfile \
            --build-arg APP_PACKAGE=${{ matrix.app_package }} \
            -t roboops/${{ matrix.image }}:ci \
            .
