name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    env:
      CI: true
      COREPACK_ENABLE_DOWNLOAD_PROMPT: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      # Postgres-backed tests remain opt-in via ROBOOPS_RUN_POSTGRES_TESTS=true.
      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  container-images:
    name: Container Images (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: test-and-build

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - app_package: "@roboops/fleet-platform"
            image: "fleet-platform"
          - app_package: "@roboops/operator-ui"
            image: "operator-ui"
          - app_package: "@roboops/cloud-edge-simulator"
            image: "cloud-edge-simulator"
          - app_package: "@roboops/event-worker"
            image: "event-worker"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Collect image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/roboops-${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=ref,event=tag
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Log in to GHCR
        if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/container-images/Dockerfile
          build-args: |
            APP_PACKAGE=${{ matrix.app_package }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
