services:
  postgres:
    image: postgres:18-alpine
    container_name: roboops-local-postgres
    environment:
      POSTGRES_DB: roboops_control_plane
      POSTGRES_USER: roboops
      POSTGRES_PASSWORD: roboops_local_password
    ports:
      - "55432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U roboops -d roboops_control_plane
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - roboops-local-postgres-data:/var/lib/postgresql/data

volumes:
  roboops-local-postgres-data:
