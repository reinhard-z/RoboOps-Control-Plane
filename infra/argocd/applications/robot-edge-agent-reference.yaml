apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: robot-edge-agent-reference
  namespace: argocd
  labels:
    app.kubernetes.io/name: robot-edge-agent
    app.kubernetes.io/part-of: roboops-control-plane
    app.kubernetes.io/component: edge-agent
    roboops.dev/rollout-scope: software-only
  annotations:
    # This Application is a software rollout reference, not robot mission control.
    roboops.dev/mission-dispatch-boundary: fleet-platform
spec:
  project: default
  source:
    # Replace with the private deployment repository that owns robot-specific overlays.
    repoURL: https://git.example.invalid/roboops-control-plane.git
    # Use a pinned commit SHA or immutable release tag for auditable rollouts.
    targetRevision: "0123456789abcdef0123456789abcdef01234567"
    path: infra/k8s/edge/overlays/example
  destination:
    server: https://kubernetes.default.svc
    namespace: roboops-edge
  info:
    - name: boundary
      value: GitOps deploys edge-agent software; Fleet Platform dispatches missions.
    - name: docs
      value: docs/robot-software-rollout.md
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
  revisionHistoryLimit: 3
